name: Build and deploy game

on:
  push:
    branches: [master]

env:
  GAME_NAME: arcana
  KTX_VERSION: "4.3.2"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.3.1

      - uses: extractions/setup-just@v4

      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: stable

      - name: Install KTX-Software (toktx)
        run: just install-ktx

      - name: Add KTX-Software to PATH
        shell: pwsh
        run: |
          $toktx = Get-ChildItem -Path "C:\KTX-Software" -Recurse -File -Filter "toktx.exe" | Select-Object -First 1
          if (-not $toktx) {
            throw "toktx.exe not found under C:\KTX-Software after install"
          }
          $ktxPath = $toktx.Directory.FullName
          echo "KTX_BIN_PATH=$ktxPath" >> $env:GITHUB_ENV
          echo "$ktxPath" >> $env:GITHUB_PATH

      - name: Build release exe
        run: just build-release

      - name: Copy files to output folder
        shell: bash
        run: |
          mkdir -p output
          just pack-assets
          cp assets.pak output/assets.pak
          cp target/release/${{ env.GAME_NAME }}.exe output/
          cd output
          7z a ../${{ env.GAME_NAME }}-windows.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: ${{ env.GAME_NAME }}-windows.zip

  # Separate job since butler only works on linux and we need
  # to run cargo build on windows to generate the .exe
  deploy-windows:
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: .

      - name: Push to itch.io
        uses: ./.github/actions/butler
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: ${{ env.GAME_NAME }}
          ITCH_USER: tvdboom
          PACKAGE: ${{ env.GAME_NAME }}-windows.zip

  build-deploy-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4.3.1

      - uses: extractions/setup-just@v4

      - uses: hecrj/setup-rust-action@v2.0.1
        with:
          rust-version: stable

      - name: Install system dependencies (ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install KTX-Software (toktx)
        run: just install-ktx

      - name: Build WASM
        run: just build-wasm

      - name: Bundle assets into assets.pak
        run: just pack-assets

      - name: Copy assets archive
        run: cp assets.pak docs/assets.pak

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3.0.0
        with:
          path: docs/

      - name: Deploy GitHub Pages site
        if: steps.pages.outcome == 'success'
        id: deploy
        uses: actions/deploy-pages@v4.0.5

      - name: Push to itch.io
        uses: ./.github/actions/butler
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          ITCH_USER: tvdboom
          ITCH_GAME: ${{ env.GAME_NAME }}
          CHANNEL: html
          PACKAGE: docs/
